name: Build macOS App

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build renderer
        run: npx vite build

      # Unsigned build — no Developer ID certificate in CI. electron-builder
      # falls back to ad-hoc signing so the app still runs on Apple Silicon.
      # Add CSC_LINK / CSC_KEY_PASSWORD secrets later for signed, auto-updating
      # releases.
      - name: Build DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac dmg --config.mac.identity=null --publish never

      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: BASE 1520 v${{ steps.ver.outputs.version }}
          files: dist-electron/*.dmg
          body: |
            ## Install

            1. Download the DMG below — **arm64** for Apple Silicon Macs (M1/M2/M3/M4), **x64** for Intel Macs.
            2. Open it and drag **BASE 1520** into **Applications** (replace the old one).
            3. First launch: if macOS says the app can't be verified, open **System Settings → Privacy & Security**, scroll down, and click **Open Anyway**. This is a one-time step because this build is not notarized.
